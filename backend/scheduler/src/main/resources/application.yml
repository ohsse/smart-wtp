spring:
  application:
    name: smart-wtp-scheduler
  profiles:
    include: common
  datasource:
    url: ${DB_URL:jdbc:p6spy:postgresql://localhost:5432/smartwtp}
    username: ${DB_USERNAME:smartwtp}
    password: ${DB_PASSWORD:smartwtp}
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        # p6spy가 SQL 포매팅 및 파라미터 바인딩을 담당하므로 비활성화
        format_sql: false
        show_sql: false
  batch:
    job:
      enabled: false
  main:
    web-application-type: none
