# p6spy SQL 로깅 설정
# SLF4J를 통해 로그 출력 (logback과 연동)
appender=com.p6spy.engine.spy.appender.Slf4JLogger

# 커스텀 SQL 포맷터 (바인딩 파라미터 치환 + pretty-print)
logMessageFormat=com.mo.smartwtp.common.p6spy.CustomP6SpySqlFormatter

# 로그 레벨
logLevel=info

# 실행 시간 임계값 (ms) — 이 시간 이상 걸린 쿼리만 로깅, 0 = 모두 로깅
executionThreshold=0
